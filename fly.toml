# Configuração do Fly.io — plataforma de vídeos/cursos (MVP).
# Troque "app" por um nome único (o mesmo usado no `fly launch`).
app = "psico-cursos-sabrina"
primary_region = "gru" # São Paulo — menor latência no Brasil

[build]

[env]
  PORT = "8080"
  DATABASE_URL = "file:/data/prod.db"
  VIDEO_STORAGE_DIR = "/data/videos"

# Volume persistente: guarda o banco SQLite e os vídeos enviados.
# Sem isso, cada deploy/restart apagaria tudo.
[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Controle MANUAL: o proxy NÃO liga a máquina sozinho a cada requisição,
  # e ela não desliga sozinha quando ligada. Você liga/desliga via CLI.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

# Uma única VM — importante: o volume é por-máquina, então NÃO escale para
# mais de 1 instância (banco e vídeos divergiriam entre elas).
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
